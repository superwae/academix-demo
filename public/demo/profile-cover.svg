<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="hill" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#sky)"/>
  <ellipse cx="200" cy="320" rx="180" ry="100" fill="url(#hill)"/>
  <ellipse cx="600" cy="340" rx="400" ry="120" fill="url(#hill)"/>
  <ellipse cx="1000" cy="310" rx="220" ry="90" fill="url(#hill)"/>
  <!-- Abstract building / campus -->
  <rect x="400" y="180" width="120" height="140" fill="white" fill-opacity="0.15" rx="4"/>
  <rect x="530" y="220" width="100" height="100" fill="white" fill-opacity="0.12" rx="4"/>
  <rect x="640" y="160" width="140" height="160" fill="white" fill-opacity="0.18" rx="4"/>
  <rect x="790" y="200" width="110" height="120" fill="white" fill-opacity="0.14" rx="4"/>
  <circle cx="950" cy="120" r="40" fill="white" fill-opacity="0.25"/>
  <circle cx="180" cy="100" r="25" fill="white" fill-opacity="0.3"/>
</svg>
